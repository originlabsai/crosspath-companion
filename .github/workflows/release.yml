name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build all platforms
        run: |
          mkdir -p dist
          PKG="github.com/crosspath/mcp-client/internal/config"
          VERSION="${GITHUB_REF_NAME}"
          BACKEND_URL="wss://crosspath.im/mcp/connect"
          LDFLAGS="-X ${PKG}.DefaultBackendURL=${BACKEND_URL} -X main.Version=${VERSION} -s -w"

          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/cross_companion-linux-amd64   ./cmd/cross_companion
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/cross_companion-linux-arm64   ./cmd/cross_companion
          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/cross_companion-darwin-amd64  ./cmd/cross_companion
          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/cross_companion-darwin-arm64  ./cmd/cross_companion
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/cross_companion-windows-amd64.exe ./cmd/cross_companion

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
